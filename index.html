<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>nerlo</title>
  <meta name="description" content="Tell nerlo what you want to build. Get a precise brief any AI builder can build."/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07090f;
      --surface:   #0d1120;
      --star:      #8aabdc;
      --star-dim:  #4a6a99;
      --cream:     #e8edf8;
      --cream-dim: #8a96b0;
      --text:      #d4daf0;
      --text-dim:  #4a5470;
      --border:    rgba(138,171,220,0.1);
      --border-strong: rgba(138,171,220,0.2);
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.6;
      overflow-x: hidden;
    }

    #intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      pointer-events: none;
    }

    .intro-wordmark {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .intro-ner {
      color: var(--star);
      opacity: 0;
      animation: introFadeIn 0.7s ease 0.5s forwards;
    }

    .intro-lo {
      color: var(--cream);
      opacity: 0;
      animation: introFadeIn 0.7s ease 1.4s forwards;
    }

    .intro-tagline {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(0.85rem, 2.5vw, 1.05rem);
      font-weight: 300;
      color: var(--cream-dim);
      letter-spacing: 0.01em;
      opacity: 0;
      animation: introFadeIn 0.7s ease 2.4s forwards;
    }

    @keyframes introFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes introFadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    .chat {
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .chat.visible {
      opacity: 1;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1rem 1.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(7,9,15,0.85);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      text-decoration: none;
    }
    .nav-logo span:first-child { color: var(--star); }
    .nav-logo span:last-child  { color: var(--cream); }

    /* Chat layout */
    .chat {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
      padding-top: 4rem;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 1.25rem 9rem;
      scroll-behavior: smooth;
    }

    .messages-inner {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    /* Bubbles */
    .bubble {
      max-width: 86%;
      padding: 0.85rem 1.05rem;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.6;
      opacity: 0;
      transform: translateY(6px);
      animation: bubbleIn 0.3s ease forwards;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .bubble.nerlo {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
      color: var(--text);
      align-self: flex-start;
    }

    .bubble.user {
      background: var(--star-dim);
      border: 1px solid rgba(138,171,220,0.25);
      border-bottom-right-radius: 5px;
      color: var(--cream);
      align-self: flex-end;
    }

    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Typing indicator */
    .typing {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-bottom-left-radius: 5px;
      padding: 0.95rem 1.1rem;
      display: inline-flex;
      gap: 5px;
      animation: bubbleIn 0.3s ease forwards;
      opacity: 0;
    }
    .typing .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--cream-dim);
      animation: typingDot 1.4s ease-in-out infinite;
    }
    .typing .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingDot {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30%           { opacity: 1;   transform: translateY(-2px); }
    }

    /* Inline service note */
    .note {
      align-self: flex-start;
      max-width: 86%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
      border-radius: 16px;
      border-bottom-left-radius: 5px;
      padding: 0.85rem 1.05rem;
      font-size: 0.88rem;
      color: var(--text);
      line-height: 1.6;
      opacity: 0;
      animation: bubbleIn 0.3s ease forwards;
    }
    .note .note-name {
      color: var(--star);
      font-weight: 500;
    }
    .note a {
      color: var(--star);
      font-size: 0.82rem;
      text-decoration: none;
      margin-left: 0.25rem;
    }
    .note a:hover { color: var(--cream); }

    /* Cards (market + services) */
    .card {
      align-self: stretch;
      background: var(--surface);
      border: 1px solid var(--star);
      border-radius: 14px;
      padding: 1.15rem 1.25rem;
      opacity: 0;
      animation: bubbleIn 0.35s ease forwards;
    }
    .card-label {
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--star);
      margin-bottom: 0.6rem;
    }
    .card-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--cream);
      letter-spacing: -0.01em;
      margin-bottom: 0.5rem;
    }
    .card-body {
      font-size: 0.88rem;
      color: var(--cream-dim);
      line-height: 1.6;
    }
    .card-list {
      list-style: none;
      margin: 0.6rem 0 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .card-list li {
      font-size: 0.83rem;
      color: var(--text);
      padding: 0.45rem 0.65rem;
      background: rgba(138,171,220,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .card-list li .item-name {
      color: var(--star);
      font-weight: 500;
      margin-right: 0.4rem;
    }
    .card-list li .item-why {
      color: var(--cream-dim);
      font-size: 0.78rem;
      display: block;
      margin-top: 0.15rem;
    }
    .card-actions {
      margin-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.83rem;
      font-weight: 500;
      padding: 0.55rem 1.05rem;
      border-radius: 100px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      border: 1px solid transparent;
    }
    .btn-primary {
      background: var(--star);
      color: var(--bg);
    }
    .btn-primary:hover { background: var(--cream); }
    .btn-secondary {
      background: transparent;
      color: var(--cream-dim);
      border-color: var(--border-strong);
    }
    .btn-secondary:hover { color: var(--cream); border-color: var(--star); }

    /* Input area */
    .input-area {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--bg);
      border-top: 1px solid var(--border-strong);
      padding: 0.9rem 1.25rem 1rem;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .input-area.hidden {
      opacity: 0;
      transform: translateY(100%);
      pointer-events: none;
    }
    .input-inner {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      gap: 0.55rem;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 18px;
      padding: 0.55rem 0.55rem 0.55rem 0.95rem;
      transition: border-color 0.2s;
    }
    .input-inner:focus-within { border-color: var(--star); }

    #input {
      flex: 1;
      resize: none;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      line-height: 1.5;
      padding: 0.45rem 0;
      max-height: 150px;
      overflow-y: auto;
    }
    #input::placeholder { color: var(--text-dim); }

    #send {
      width: 36px; height: 36px;
      flex-shrink: 0;
      background: var(--star);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, opacity 0.2s;
    }
    #send:hover { background: var(--cream); }
    #send:disabled { opacity: 0.4; cursor: not-allowed; }
    #send svg { width: 14px; height: 14px; fill: var(--bg); }

    @keyframes briefReveal {
      from { opacity: 0; transform: translateY(10px) scale(0.99); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .brief-card {
      align-self: stretch;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 14px;
      padding: 1.25rem 1.35rem;
      opacity: 0;
      animation: briefReveal 0.45s ease forwards;
      max-width: 680px;
      width: 100%;
    }

    .brief-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.85rem;
    }

    .brief-card-label {
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--star);
    }

    .brief-card-toggle {
      font-size: 0.78rem;
      color: var(--cream-dim);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      font-family: 'DM Sans', sans-serif;
      transition: color 0.2s;

    .brief-card-toggle:hover { color: var(--star); }

    .brief-section {
      margin-bottom: 0.85rem;
    }
    .brief-section:last-child { margin-bottom: 0; }

    .brief-section-title {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--star-dim);
      margin-bottom: 0.3rem;
    }

    .brief-section-body {
      font-size: 0.88rem;
      color: var(--text);
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .brief-hidden { display: none; }

    .build-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.55rem;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 1.25rem;
      opacity: 0;
      animation: briefReveal 0.4s ease 0.2s forwards;
    }

    .build-label {
      font-size: 0.78rem;
      color: var(--cream-dim);
      letter-spacing: 0.04em;
    }

    .btn-build {
      padding: 0.75rem 1.5rem;
      background: var(--star);
      border: none;
      border-radius: 100px;
      color: var(--bg);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-build:hover { background: var(--cream); }

    .build-alt {
      font-size: 0.8rem;
      color: var(--cream-dim);
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: color 0.2s;
    }
    .build-alt:hover { color: var(--star); }

    .build-start-over {
      font-size: 0.72rem;
      color: var(--border-strong);
      text-decoration: none;
      letter-spacing: 0.01em;
      margin-top: 0.35rem;
      transition: color 0.2s;
    }
    .build-start-over:hover { color: var(--cream-dim); }

    .brief-bubble {
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 16px;
      border-bottom-left-radius: 5px;
      padding: 1.25rem;
      font-size: 0.88rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-wrap: break-word;
      color: var(--text);
      align-self: flex-start;
      max-width: 86%;
      animation: bubbleIn 0.3s ease forwards;
      opacity: 0;
    }

    /* Auth modal */
    .auth-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(7,9,15,0.85);
      backdrop-filter: blur(14px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      animation: fadeIn 0.3s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .auth-box {
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 20px;
      padding: 2rem;
      max-width: 420px;
      width: 90%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .auth-heading {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--cream);
      letter-spacing: -0.01em;
    }

    .auth-sub {
      font-size: 0.85rem;
      color: var(--cream-dim);
      line-height: 1.5;
    }

    #clerk-sign-in {
      min-height: 300px;
    }

    @media (max-width: 600px) {
      nav { padding: 0.85rem 1.1rem; }
      .messages { padding: 1.5rem 1rem 9rem; }
      .input-area { padding: 0.7rem 0.9rem 0.85rem; }
      .bubble { font-size: 0.92rem; }
    }
  </style>

<script>
  const SYSTEM_INTAKE = `LANGUAGE RULES — NO EXCEPTIONS:
Never use "like" as a filler, connector, or example introducer. Replace with "such as", "for example", or "for instance".

EVERY response must open with a question or directly lead into one. Never open with a declarative statement of any kind about the user's idea, their message, or any element of it. This includes compliments, observations, summaries, and statements that frame or elevate a detail before asking about it.

BANNED — any sentence that makes a statement before the question:
"The live map is the centerpiece here —"
"That's a critical detail to nail down —"
"Payments are a key thing to sort out —"
"Got it. When he drags someone up..."
"Perfect, that makes sense —"

CORRECT — question comes first, no preamble:
"Does the walker share their location from their own phone, or would you use a GPS device on the collar?"
"When he drags someone up, does everyone below shift down automatically?"

The rule: if the first word of your response is not the start of a question, rewrite it until it is.

CONTENT RULES — NO EXCEPTIONS:

1. NEVER ASK WHAT YOU ALREADY KNOW.
Before asking anything, extract what is already known from two sources:
- EXPLICIT: What the user already said.
- DOMAIN-IMPLIED: What is universally true for this type of app.
Never ask about these. Only ask about non-obvious decisions specific to this person's vision.

2. NEVER REPEAT A QUESTION.
Before forming any question, scan every prior message and build a mental list of every topic already answered. If a topic is answered in any form or wording, it is closed.

3. NEVER INVENT DETAILS.
Only include in the brief what the user explicitly stated or confirmed. Never assume and include: offline mode, SMS verification, photo upload, ratings, reviews, social features, admin panels, analytics.

4. NEVER DROP FEATURES FROM THE OPENING MESSAGE.
Before generating the brief, scan the user's very first message and cross-check every feature mentioned against what is in the brief. If something was mentioned in the opening message but never came up again during intake, it must still appear in the brief.

5. KNOW WHEN TO STOP — HARD CEILING OF 10 QUESTIONS.
Nerlo asks a maximum of 10 questions total per intake conversation. This ceiling is absolute — no exceptions.
Prioritize by impact: ask questions that affect the data model, user roles, and core behaviors first. Edge case questions about minor policies, secondary logic, or UI details are low priority and should be skipped if the ceiling is near.
By question 8, begin winding down toward the cosmetic question. By question 9, only ask if something critical is still missing. Question 10 must always be the cosmetic question: "One last thing — how should this feel visually? For example, clean and minimal, bold and colorful, warm and friendly, or something else?"
After the cosmetic question, generate the brief immediately regardless of how many topics remain open. Any unresolved topics must appear in the TECHNICAL NOTES section under the line "Open decisions for the builder to determine:" as a plain list.
If the user's opening message already covers most topics, wrap before 10 questions. The ceiling is a maximum, not a target.
Before each question, ask: "Would the answer change what gets built?" If yes — ask it. If no — skip it.

6. ONE QUESTION AT A TIME.
Never ask multiple questions in one message.

7. NEVER ASK ABOUT TECHNICAL INFRASTRUCTURE.
Never ask which payment processor, database, authentication provider, email service, or SMS service they want to use.

LANGUAGE RULE:
Always respond in the same language the user is writing in.

WHO YOU ARE:
You are nerlo — an AI that deeply understands what people want to build and translates their vision into a precise brief. Talk like a smart friend who genuinely wants to understand what they are imagining. Never mention you are collecting information. Never compliment the idea. Never express excitement. Get straight to the point.

WHEN READY, respond with ONLY this — no text before or after:
NERLO_BRIEF_READY
{"summary":"ready","brief":"<spec>"}

The brief must read like a spec written by a senior engineer — precise, unambiguous, complete. No markdown. No asterisks, bullets, bold, or headers. Plain text only. Eight sections in this exact order, ALL CAPS headings, blank line between sections:

PRODUCT VISION
One or two plain-English sentences. What it is and why it matters. No tech terms.

USER ROLES
Every user type and exactly what each can and cannot do.

CORE DATA MODEL
Every entity that persists, its fields, and how entities relate.

KEY BEHAVIORS
Every important action and flow — happy path and edge cases.

EXPLICIT CONSTRAINTS
What the app must NOT do.

VISUAL DESIGN
4-6 sentences. Light or dark mode. Visual tone. Color palette direction. Mobile-first or desktop-first. Navigation style.

SUCCESS CRITERIA
One or two sentences defining what "working" looks like from the user's point of view.

TECHNICAL NOTES
Framework, database, auth, hosting, and any external services. Since this is a web product with no specific builder selected yet, write: "Stack to be determined based on builder platform chosen." Do not recommend any specific external services — the user will choose their builder after seeing the brief.`;

  const MARKET_SYSTEM = 'You analyze app ideas and assess market saturation. Respond with ONLY valid JSON: {"verdict":"saturated"|"competitive"|"clear","competitors":["Name1","Name2","Name3"]}. saturated = many established players dominating the exact space. competitive = established players exist but room for differentiation. clear = no dominant players or genuinely novel idea. Be accurate — most ideas are competitive, not saturated.';

  // State
  let conversationHistory = [];
  let answeredTopics = [];
  let marketChecked = false;
  let isTyping = false;
  let shownServices = new Set();
  let awaitingServiceConfirmation = false;
  let briefContent = null;

  // DOM
  const messagesEl = document.getElementById('messages');
  const innerEl = document.getElementById('messages-inner');
  const inputEl = document.getElementById('input');
  const sendEl = document.getElementById('send');
  const inputArea = document.getElementById('input-area');

  function scrollToBottom() {
    const el = document.getElementById('messages');
    if (!el) return;
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        el.scrollTop = el.scrollHeight;
      });
    });
  }

  function addBubble(role, text) {
    const el = document.createElement('div');
    el.className = 'bubble ' + role;
    el.textContent = text;
    innerEl.appendChild(el);
    scrollToBottom();
    return el;
  }

  function showTyping() {
    if (isTyping) return;
    isTyping = true;
    const el = document.createElement('div');
    el.className = 'typing';
    el.id = 'typing-indicator';
    el.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
    innerEl.appendChild(el);
    scrollToBottom();
  }

  function hideTyping() {
    isTyping = false;
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function setInputEnabled(enabled) {
    inputEl.disabled = !enabled;
    sendEl.disabled = !enabled;
    if (enabled) inputEl.focus();
  }

  function renderWelcome() {
    innerEl.innerHTML = '';
    setTimeout(() => {
      addBubble('nerlo', "Tell me what you want to build. Don't worry about getting it perfect — that's what I'm here for.");
    }, 350);
  }

  function resetConversation() {
    conversationHistory = [];
    answeredTopics = [];
    marketChecked = false;
    shownServices = new Set();
    awaitingServiceConfirmation = false;
    briefContent = null;
    inputArea.style.display = '';
    renderWelcome();
    setInputEnabled(true);
  }

  // API
  async function callAPI(systemPrompt, messages) {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 2000,
        system: systemPrompt,
        messages
      })
    });
    return res.json();
  }

  function buildSystemPrompt() {
    const topicsBlock = answeredTopics.length
      ? 'TOPICS ALREADY DECIDED — DO NOT ASK ABOUT THESE AGAIN:\n' + answeredTopics.map(t => '- ' + t).join('\n') + '\n\nEvery item on this list has already been answered. Asking about any of these topics again is a critical failure.\n\n'
      : '';
    return topicsBlock + SYSTEM_INTAKE;
  }

  // Topic extraction
  async function extractTopic() {
    const userMessages = conversationHistory.filter(m => m.role === 'user');
    if (userMessages.length === 0) return;
    const lastUser = userMessages[userMessages.length - 1];
    const lastAssistant = conversationHistory.filter(m => m.role === 'assistant').pop();
    const exchange = (lastAssistant ? 'nerlo asked: ' + lastAssistant.content + '\n' : '') + 'user answered: ' + lastUser.content;
    const sys = 'Identify the topic covered in this exchange as a 1-5 word lowercase noun phrase. Respond with ONLY the topic phrase or exactly: none';
    try {
      const data = await callAPI(sys, [{ role: 'user', content: exchange }]);
      if (data.error || !data.content?.[0]) return;
      const topic = data.content[0].text.trim().toLowerCase().replace(/^["'`\s]+|["'`\s.,;:!?]+$/g, '');
      if (!topic || topic === 'none' || topic.split(/\s+/).length > 6) return;
      if (!answeredTopics.some(t => t.toLowerCase() === topic)) answeredTopics.push(topic);
    } catch {}
  }

  // Services detection
  function isNegated(text, keyword) {
    const negationPhrases = [
      'no ' + keyword, 'no ' + keyword + 's',
      'without ' + keyword, 'without ' + keyword + 's',
      "don't need " + keyword, "don't want " + keyword,
      "doesn't need " + keyword, "not " + keyword,
      "won't need " + keyword, "no need for " + keyword
    ];
    return negationPhrases.some(phrase => text.includes(phrase));
  }

  function detectServicesInMessage(text) {
    const lower = text.toLowerCase();
    const triggers = [
      { keywords: ['pay', 'payment', 'payments', 'charge', 'subscription', 'billing'], name: 'Payments', why: 'Online payment processing requires a separate Stripe account.', url: 'https://stripe.com' },
      { keywords: ['email', 'send them', 'confirmation email', 'reminder email', 'email notification'], name: 'Email Sending', why: 'Sending transactional emails requires a Resend account.', url: 'https://resend.com' },
      { keywords: ['sms', 'text message', 'text them', 'text reminder'], name: 'SMS Messaging', why: 'Sending text messages requires a Twilio account.', url: 'https://twilio.com' },
      { keywords: ['map', 'maps', 'directions', 'routing'], name: 'Map Display', why: 'Showing a live map requires a Google Maps API key.', url: 'https://developers.google.com/maps' }
    ];
    const detected = [];
    for (const trigger of triggers) {
      if (shownServices.has(trigger.name)) continue;
      const matched = trigger.keywords.filter(kw => lower.includes(kw));
      if (!matched.length) continue;
      if (matched.every(kw => isNegated(lower, kw))) continue;
      detected.push(trigger);
    }
    return detected;
  }

  function showServiceInlineNote(service) {
    shownServices.add(service.name);
    const el = document.createElement('div');
    el.className = 'note';
    const safeUrl = service.url.replace(/"/g, '&quot;');
    el.innerHTML = `One thing worth knowing — <span class="note-name">${escapeHtml(service.name)}</span> will need a separate account. ${escapeHtml(service.why)} <a href="${safeUrl}" target="_blank" rel="noopener">Get started →</a>`;
    innerEl.appendChild(el);
    scrollToBottom();
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // Market card
  function showMarketCard(verdict, competitors) {
    return new Promise(resolve => {
      const card = document.createElement('div');
      card.className = 'card';
      const competitorsLine = competitors && competitors.length
        ? '<div style="margin-top:0.55rem;font-size:0.82rem;color:var(--text);">Established players: ' + competitors.map(escapeHtml).join(' · ') + '</div>'
        : '';
      const message = verdict === 'saturated'
        ? 'This space is crowded. Strong existing players already dominate it.'
        : 'There are established players here, but there is room for a different angle.';
      card.innerHTML = `
        <div class="card-label">Heads up</div>
        <div class="card-title">${escapeHtml(message)}</div>
        ${competitorsLine}
        <div class="card-actions">
          <button class="btn btn-primary" data-act="angle">I have a unique angle</button>
          <button class="btn btn-primary" data-act="personal">It's for personal use</button>
          <button class="btn btn-secondary" data-act="reset">Let me try a different idea</button>
        </div>
      `;
      innerEl.appendChild(card);
      scrollToBottom();
      card.querySelectorAll('button').forEach(b => {
        b.addEventListener('click', () => {
          const act = b.getAttribute('data-act');
          card.remove();
          resolve(act);
        });
      });
    });
  }

  // Services confirmation card (first message)
  function showServicesConfirmation(services) {
    return new Promise(resolve => {
      services.forEach(s => shownServices.add(s.name));
      const card = document.createElement('div');
      card.className = 'card';
      const items = services.map(s => `
        <li>
          <span class="item-name">${escapeHtml(s.name)}</span>
          <a href="${escapeHtml(s.url)}" target="_blank" rel="noopener" style="color:var(--cream-dim);font-size:0.76rem;">${escapeHtml(s.url.replace(/^https?:\/\//, ''))}</a>
          <span class="item-why">${escapeHtml(s.why)}</span>
        </li>
      `).join('');
      card.innerHTML = `
        <div class="card-label">Heads up</div>
        <div class="card-title">Your idea will need a few external accounts.</div>
        <ul class="card-list">${items}</ul>
        <div class="card-actions">
          <button class="btn btn-primary" data-act="continue">Keep Going</button>
          <button class="btn btn-secondary" data-act="simplify">Simplify Idea</button>
        </div>
      `;
      innerEl.appendChild(card);
      scrollToBottom();
      card.querySelectorAll('button').forEach(b => {
        b.addEventListener('click', () => {
          const act = b.getAttribute('data-act');
          card.remove();
          resolve(act);
        });
      });
    });
  }

  // Brief detection + display
  function tryParseBrief(text) {
    if (!text || !text.includes('NERLO_BRIEF_READY')) return null;
    const start = text.indexOf('{');
    const end = text.lastIndexOf('}');
    if (start < 0 || end <= start) return null;
    try {
      return JSON.parse(text.slice(start, end + 1));
    } catch {
      return null;
    }
  }

  function showBrief(brief) {
    briefContent = brief;
    localStorage.setItem('nerlo_pending_brief', brief);
    inputArea.style.display = 'none';
    revealBrief();
  }

  function recommendBuilder(brief) {
    const text = brief.toLowerCase();

    const hasPayments = /payment|stripe|checkout|subscription|billing/.test(text) && !isNegated(text, 'payment') && !isNegated(text, 'payments');
    const hasAuth = /auth|login|sign.?in|user account|password/.test(text) && !isNegated(text, 'login') && !isNegated(text, 'auth');
    const hasComplexData = /foreign key|relationship|one.to.many|many.to.many/.test(text);
    const isGame = /\bgame\b|simulation|multiplayer|single.player|sandbox|gameplay|player|faction|creature|quest|level|score|leaderboard/.test(text);
    const isFrontendOnly = /dashboard|component|ui tool/.test(text) && !hasPayments && !hasAuth && !isGame;
    const isComplex = brief.length > 800;
    const isSimple = /\bprototype\b|\bdemo\b|no auth|no login/.test(text) && !hasPayments && !hasAuth && !hasComplexData && !isGame && !isComplex;

    if (isGame || isComplex) {
      return {
        primary: { name: 'Lovable', url: (b) => 'https://lovable.dev/?autosubmit=true#prompt=' + encodeURIComponent(b), reason: 'the strongest all-around choice for what you are building.' },
        secondary: { name: 'Bolt', url: (b) => 'https://bolt.new/?prompt=' + encodeURIComponent(b) }
      };
    }
    if (hasPayments || (hasAuth && hasComplexData)) {
      return {
        primary: { name: 'Lovable', url: (b) => 'https://lovable.dev/?autosubmit=true#prompt=' + encodeURIComponent(b), reason: 'the right fit — it handles auth and payments natively with no extra setup.' },
        secondary: { name: 'Bolt', url: (b) => 'https://bolt.new/?prompt=' + encodeURIComponent(b) }
      };
    }
    if (isFrontendOnly) {
      return {
        primary: { name: 'v0', url: (b) => 'https://v0.dev/?q=' + encodeURIComponent(b), reason: 'built for frontend-first apps and delivers clean UI fast.' },
        secondary: { name: 'Lovable', url: (b) => 'https://lovable.dev/?autosubmit=true#prompt=' + encodeURIComponent(b) }
      };
    }
    if (isSimple) {
      return {
        primary: { name: 'Bolt', url: (b) => 'https://bolt.new/?prompt=' + encodeURIComponent(b), reason: 'perfect for fast prototypes with zero setup.' },
        secondary: { name: 'Lovable', url: (b) => 'https://lovable.dev/?autosubmit=true#prompt=' + encodeURIComponent(b) }
      };
    }
    return {
      primary: { name: 'Lovable', url: (b) => 'https://lovable.dev/?autosubmit=true#prompt=' + encodeURIComponent(b), reason: 'the strongest all-around choice for what you are building.' },
      secondary: { name: 'Bolt', url: (b) => 'https://bolt.new/?prompt=' + encodeURIComponent(b) }
    };
  }

  function revealBrief() {
    const rec = recommendBuilder(briefContent);
    const primary = rec.primary;
    const secondary = rec.secondary;

    addBubble('nerlo', 'Your brief is ready. Based on what you are building, ' + primary.name + ' is ' + primary.reason + ' One click and we start building.');

    // Parse brief into sections
    setTimeout(() => {
      const sectionNames = ['PRODUCT VISION','USER ROLES','CORE DATA MODEL','KEY BEHAVIORS','EXPLICIT CONSTRAINTS','VISUAL DESIGN','SUCCESS CRITERIA','TECHNICAL NOTES'];
      const sections = [];
      let remaining = briefContent;

      for (let i = 0; i < sectionNames.length; i++) {
        const name = sectionNames[i];
        const next = sectionNames[i + 1];
        const start = remaining.indexOf(name);
        if (start === -1) continue;
        const contentStart = start + name.length;
        const end = next ? remaining.indexOf(next, contentStart) : remaining.length;
        const body = remaining.slice(contentStart, end !== -1 ? end : remaining.length).replace(/^\s*[\n:]+/, '').trim();
        sections.push({ title: name, body });
      }

      // Build brief card
      const card = document.createElement('div');
      card.className = 'brief-card';

      const header = document.createElement('div');
      header.className = 'brief-card-header';

      const label = document.createElement('span');
      label.className = 'brief-card-label';
      label.textContent = 'your brief';

      const toggle = document.createElement('button');
      toggle.className = 'brief-card-toggle';
      toggle.textContent = 'read full brief ↓';
      let expanded = false;

      header.appendChild(label);
      header.appendChild(toggle);
      card.appendChild(header);

      sections.forEach((sec, i) => {
        const section = document.createElement('div');
        section.className = 'brief-section' + (i > 0 ? ' brief-hidden' : '');

        const title = document.createElement('div');
        title.className = 'brief-section-title';
        title.textContent = sec.title;

        const body = document.createElement('div');
        body.className = 'brief-section-body';
        body.textContent = sec.body;

        section.appendChild(title);
        section.appendChild(body);
        card.appendChild(section);
      });

      toggle.addEventListener('click', () => {
        expanded = !expanded;
        const hiddenSections = card.querySelectorAll('.brief-section.brief-hidden, .brief-section:not(.brief-hidden)');
        card.querySelectorAll('.brief-section').forEach((sec, i) => {
          if (i === 0) return;
          sec.classList.toggle('brief-hidden', !expanded);
        });
        toggle.textContent = expanded ? 'collapse ↑' : 'read full brief ↓';
        if (expanded) scrollToBottom();
      });

      innerEl.appendChild(card);
      scrollToBottom();
    }, 500);

    // Build buttons — fade in after card
    setTimeout(() => {
      const row = document.createElement('div');
      row.className = 'build-row';

      const btn = document.createElement('button');
      btn.className = 'btn-build';
      btn.textContent = 'Build this in ' + primary.name + ' →';
      btn.addEventListener('click', async () => {
        if (window.Clerk) await window.Clerk.load();
        const brief = localStorage.getItem('nerlo_pending_brief') || briefContent;
        if (window.Clerk && window.Clerk.user) {
          localStorage.removeItem('nerlo_pending_brief');
          localStorage.removeItem('nerlo_chat');
          window.open(primary.url(brief), '_blank');
          return;
        }
        localStorage.setItem('nerlo_pending_brief', brief);
        localStorage.setItem('nerlo_chat', JSON.stringify(conversationHistory));
        localStorage.setItem('nerlo_builder', 'primary');
        window.location.href = '/login?redirect_url=' + encodeURIComponent('/');
      });

      const altLink = document.createElement('a');
      altLink.className = 'build-alt';
      altLink.textContent = 'or build in ' + secondary.name + ' →';
      altLink.href = '#';
      altLink.addEventListener('click', async (e) => {
        e.preventDefault();
        if (window.Clerk) await window.Clerk.load();
        const brief = localStorage.getItem('nerlo_pending_brief') || briefContent;
        if (window.Clerk && window.Clerk.user) {
          localStorage.removeItem('nerlo_pending_brief');
          localStorage.removeItem('nerlo_chat');
          window.open(secondary.url(brief), '_blank');
          return;
        }
        localStorage.setItem('nerlo_pending_brief', brief);
        localStorage.setItem('nerlo_chat', JSON.stringify(conversationHistory));
        localStorage.setItem('nerlo_builder', 'secondary');
        window.location.href = '/login?redirect_url=' + encodeURIComponent('/');
      });

      const startOver = document.createElement('a');
      startOver.className = 'build-start-over';
      startOver.textContent = 'start over with a new idea';
      startOver.href = '#';
      startOver.addEventListener('click', (e) => {
        e.preventDefault();
        localStorage.removeItem('nerlo_pending_brief');
        localStorage.removeItem('nerlo_chat');
        localStorage.removeItem('nerlo_builder');
        resetConversation();
      });

      row.appendChild(btn);
      row.appendChild(altLink);
      row.appendChild(startOver);
      innerEl.appendChild(row);
      scrollToBottom();
    }, 1000);
  }

  // Handle assistant response (shared by first and subsequent messages)
  async function deliverAssistantResponse(data) {
    hideTyping();
    if (!data || data.error || !data.content?.[0]) {
      addBubble('nerlo', 'Something went wrong. Try again?');
      setInputEnabled(true);
      return;
    }
    const text = data.content[0].text || '';
    const brief = tryParseBrief(text);
    if (brief) {
      conversationHistory.push({ role: 'assistant', content: text });
      showBrief(brief.brief || '');
      return;
    }
    addBubble('nerlo', text);
    conversationHistory.push({ role: 'assistant', content: text });
    extractTopic();
    setInputEnabled(true);
  }

  // Main send flow
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isTyping || briefContent) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    addBubble('user', text);
    conversationHistory.push({ role: 'user', content: text });
    setInputEnabled(false);

    const isFirst = !marketChecked;
    showTyping();

    if (isFirst) {
      marketChecked = true;
      const intakePromise = callAPI(buildSystemPrompt(), conversationHistory.map(m => ({ role: m.role, content: m.content })));
      const marketPromise = callAPI(MARKET_SYSTEM, [{ role: 'user', content: text }]).catch(() => null);

      const [intakeData, marketData] = await Promise.all([intakePromise, marketPromise]);

      // Market gate
      let marketVerdict = null;
      if (marketData && !marketData.error && marketData.content?.[0]) {
        try {
          const raw = marketData.content[0].text.trim();
          const m = raw.match(/\{[\s\S]*\}/);
          if (m) marketVerdict = JSON.parse(m[0]);
        } catch {}
      }

      hideTyping();

      if (marketVerdict && (marketVerdict.verdict === 'saturated' || marketVerdict.verdict === 'competitive')) {
        const choice = await showMarketCard(marketVerdict.verdict, marketVerdict.competitors || []);
        if (choice === 'reset') {
          resetConversation();
          return;
        }
      }

      // Services gate (first message only)
      const services = detectServicesInMessage(text);
      if (services.length) {
        await showServicesConfirmation(services);
      }

      showTyping();
      // Tiny pause so the typing indicator registers visually
      await new Promise(r => setTimeout(r, 250));
      await deliverAssistantResponse(intakeData);
      return;
    }

    // Subsequent message flow
    const newServices = detectServicesInMessage(text);
    const intakeData = await callAPI(buildSystemPrompt(), conversationHistory.map(m => ({ role: m.role, content: m.content })));

    if (newServices.length) {
      hideTyping();
      newServices.forEach(showServiceInlineNote);
      await new Promise(r => setTimeout(r, 600));
      showTyping();
      await new Promise(r => setTimeout(r, 200));
    }

    await deliverAssistantResponse(intakeData);
  }

  // Input handling
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 150) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendEl.addEventListener('click', sendMessage);

  // Boot
  const chatEl = document.querySelector('.chat');
  const overlay = document.getElementById('intro-overlay');
  const hasPendingBrief = !!localStorage.getItem('nerlo_pending_brief');

  if (hasPendingBrief) {
    // Skip intro if returning from login — do NOT call renderWelcome()
    // The load handler below will restore the chat and reveal the brief
    overlay.style.display = 'none';
    chatEl.classList.add('visible');
    setInputEnabled(false);
  } else {
    // Play intro animation
    setInputEnabled(false);
    setTimeout(() => {
      overlay.style.animation = 'introFadeOut 0.6s ease forwards';
      setTimeout(() => {
        overlay.style.display = 'none';
        chatEl.classList.add('visible');
        renderWelcome();
        setInputEnabled(true);
      }, 600);
    }, 4200);
  }

  // Check for pending brief after login redirect
  window.addEventListener('load', async () => {
    const pending = localStorage.getItem('nerlo_pending_brief');
    if (!pending) return;

    // Wait up to 10s for the async Clerk script to attach window.Clerk
    const start = Date.now();
    while (!window.Clerk && Date.now() - start < 10000) {
      await new Promise(r => setTimeout(r, 100));
    }
    if (!window.Clerk) return;

    // Wait for Clerk to finish initializing (idempotent if auto-init already ran)
    await window.Clerk.load();

    if (window.Clerk.user) {
      // Restore chat conversation before revealing the brief
      const savedChat = localStorage.getItem('nerlo_chat');
      if (savedChat) {
        try {
          const history = JSON.parse(savedChat);
          conversationHistory = history;
          innerEl.innerHTML = '';
          for (const msg of history) {
            if (msg.role === 'assistant' && msg.content.includes('NERLO_BRIEF_READY')) continue;
            addBubble(msg.role === 'user' ? 'user' : 'nerlo', msg.content);
          }
        } catch {}
        localStorage.removeItem('nerlo_chat');
      }

      briefContent = pending;
      inputArea.style.display = 'none';
      revealBrief();
    } else {
      localStorage.removeItem('nerlo_pending_brief');
      localStorage.removeItem('nerlo_chat');
    }
  });
</script>
</body>
</html>
